services:
  redis:
    image: redis:7-alpine
    container_name: charts_tracker-redis-1
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    container_name: charts_tracker-server-1
    volumes:
      # - ./server/node_modules:/server/node_modules
      - ./server:/app/server
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    develop:
      watch:
        - action: rebuild
          path: ./app
          target: ./server
          ignore:
            - /server/node_modules/
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_started
    env_file:
      - ./server/.env
  
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - API_URL=http://server:4001
    ports:
      - "3000:3000"
    container_name: charts_tracker-client-1
    environment:
      - API_URL=http://server:4001
    depends_on:
      - server
    develop:
      watch:
        - action: rebuild
          path: ./app
          target: ./app
          ignore:
            - /server/node_modules/
    restart: unless-stopped
    env_file:
      - ./client/.env.local

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
  db_data:
  redis_data:
