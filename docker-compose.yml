services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    container_name: charts_tracker-server-1
    volumes:
      # - ./server/node_modules:/server/node_modules
      - ./server:/app/server
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${UPSTASH_REDIS_URL}
    develop:
      watch:
        - action: rebuild
          path: ./app
          target: ./server
          ignore:
            - /server/node_modules/
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - ./server/.env
  
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - API_URL=http://server:4001
    ports:
      - "3000:3000"
    container_name: charts_tracker-client-1
    environment:
      - API_URL=http://server:4001
    depends_on:
      - server
    develop:
      watch:
        - action: rebuild
          path: ./app
          target: ./app
          ignore:
            - /server/node_modules/
    restart: unless-stopped
    env_file:
      - ./client/.env.local

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
  db_data:
